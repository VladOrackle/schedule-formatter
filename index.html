<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Formatter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 0 auto;
            padding: 32px 20px;
            background-color: #f7f8fa;
            color: #1e2430;
        }
        h1 {
            margin-bottom: 12px;
        }
        p {
            margin-top: 0;
            color: #465066;
        }
        .links {
            display: grid;
            gap: 12px;
            margin-top: 24px;
        }
        .link-card {
            display: block;
            padding: 14px 16px;
            border: 1px solid #d8dce6;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            background: #ffffff;
        }
        .link-card:hover {
            border-color: #3d6fbd;
            box-shadow: 0 1px 6px rgba(61, 111, 189, 0.15);
        }
        .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .desc {
            font-size: 14px;
            color: #4f5c73;
        }
    </style>
</head>
<body>
    <h1>Форматування розкладу</h1>
    <p>Оберіть потрібний форматер:</p>
    <div class="links">
        <a class="link-card" href="schedule_formatter.html">
            <div class="title">Класичний форматер</div>
            <div class="desc">Поточний формат таблиці за прізвищами та датами чергування.</div>
        </a>
        <a class="link-card" href="schedule-by-date.html">
            <div class="title">Форматер за датами</div>
            <div class="desc">Вивід у форматі: дата, зміна, рядки з людьми.</div>
        </a>
    </div>
</body>
</html>
